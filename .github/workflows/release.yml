name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get GitHub token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/ddtest
          policy: self.github.release.tags

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v5
        with:
          go-version: '1.26.3'

      - name: Build binaries
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          make release VERSION="$TAG_NAME"

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --draft \
            --generate-notes \
            dist/*

      - name: Print Release Summary
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          RELEASE_URL=$(gh release view "$TAG_NAME" --json url --jq .url)
          echo "## Release Created! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please review and publish the release! Here is the link: $RELEASE_URL" >> $GITHUB_STEP_SUMMARY
