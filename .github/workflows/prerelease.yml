name: Pre-Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get GitHub token
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/ddtest
          policy: self.github.release.prerelease

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v5
        with:
          go-version: '1.26.3'

      - name: Build binaries
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          make release VERSION="pre-release-$SHORT_SHA"

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          gh release create "pre-release-$SHORT_SHA" \
            --title "Pre-release $SHORT_SHA" \
            --prerelease \
            dist/*
